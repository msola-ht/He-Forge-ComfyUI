services:
  apt-cacher-ng:
    build:
      context: ..
      dockerfile: docker/cache/apt-cacher-ng.Dockerfile
    image: hegenai/cache-apt-cacher-ng:local
    profiles:
      - cache
    ports:
      - "${APT_CACHE_PORT:-3142}:3142"
    volumes:
      - ${APT_CACHE_DATA_DIR:-../storage/cache-services/apt-cacher-ng}:/var/cache/apt-cacher-ng
    restart: unless-stopped

  devpi:
    build:
      context: ..
      dockerfile: docker/cache/devpi.Dockerfile
    image: hegenai/cache-devpi:local
    profiles:
      - cache
    ports:
      - "${DEVPI_PORT:-3141}:3141"
    environment:
      DEVPI_SERVERDIR: /devpi/server
    volumes:
      - ${DEVPI_DATA_DIR:-../storage/cache-services/devpi}:/devpi/server
    restart: unless-stopped

  pytorch-proxy:
    image: nginx:alpine
    profiles:
      - cache
    ports:
      - "${PYTORCH_PROXY_PORT:-3143}:80"
    volumes:
      - ./cache/nginx-pytorch.conf:/etc/nginx/nginx.conf:ro
      - ${PYTORCH_PROXY_CACHE_DIR:-../storage/cache-services/pytorch-proxy}:/var/cache/nginx/pytorch
    restart: unless-stopped

  comfyui-runtime:
    image: ${IMAGE_NAME:-hegenai/comfyui}:${RUNTIME_IMAGE_TAG:-ubuntu22.04-py312-cu128-torch2.7.0-runtime}
    ports:
      - "${RUNTIME_PORT:-8188}:8188"
    user: root
    environment:
      COMFYUI_PORT: "8188"
      COMFYUI_HOME: ${COMFYUI_HOME:-/root/ComfyUI}
      PIP_CACHE_DIR: ${PIP_CACHE_DIR:-/root/.cache/pip}
      PIP_INDEX_URL: ${PIP_INDEX_URL:-}
      PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}
      PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
      CONDA_PKGS_DIRS: ${CONDA_PKGS_DIRS:-/root/miniforge/pkgs}
      NPM_CONFIG_CACHE: ${NPM_CONFIG_CACHE:-/root/.npm}
      UV_CACHE_DIR: ${UV_CACHE_DIR:-/root/.cache/uv}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ${RUNTIME_COMFYUI_DIR:-../storage/runtime/ComfyUI}:${COMFYUI_HOME:-/root/ComfyUI}
      - ${RUNTIME_PIP_CACHE_DIR:-../storage/runtime/cache/pip}:${PIP_CACHE_DIR:-/root/.cache/pip}
      - ${RUNTIME_CONDA_CACHE_DIR:-../storage/runtime/cache/conda-pkgs}:${CONDA_PKGS_DIRS:-/root/miniforge/pkgs}
      - ${RUNTIME_NPM_CACHE_DIR:-../storage/runtime/cache/npm}:${NPM_CONFIG_CACHE:-/root/.npm}
      - ${RUNTIME_UV_CACHE_DIR:-../storage/runtime/cache/uv}:${UV_CACHE_DIR:-/root/.cache/uv}
    gpus: all

  comfyui-devel:
    image: ${IMAGE_NAME:-hegenai/comfyui}:${DEVEL_IMAGE_TAG:-ubuntu22.04-py312-cu128-torch2.7.0-devel}
    ports:
      - "${DEVEL_PORT:-8190}:8188"
    user: root
    environment:
      COMFYUI_PORT: "8188"
      COMFYUI_HOME: ${COMFYUI_HOME:-/root/ComfyUI}
      PIP_CACHE_DIR: ${PIP_CACHE_DIR:-/root/.cache/pip}
      PIP_INDEX_URL: ${PIP_INDEX_URL:-}
      PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}
      PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
      CONDA_PKGS_DIRS: ${CONDA_PKGS_DIRS:-/root/miniforge/pkgs}
      NPM_CONFIG_CACHE: ${NPM_CONFIG_CACHE:-/root/.npm}
      UV_CACHE_DIR: ${UV_CACHE_DIR:-/root/.cache/uv}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ${DEVEL_COMFYUI_DIR:-../storage/devel/ComfyUI}:${COMFYUI_HOME:-/root/ComfyUI}
      - ${DEVEL_PIP_CACHE_DIR:-../storage/devel/cache/pip}:${PIP_CACHE_DIR:-/root/.cache/pip}
      - ${DEVEL_CONDA_CACHE_DIR:-../storage/devel/cache/conda-pkgs}:${CONDA_PKGS_DIRS:-/root/miniforge/pkgs}
      - ${DEVEL_NPM_CACHE_DIR:-../storage/devel/cache/npm}:${NPM_CONFIG_CACHE:-/root/.npm}
      - ${DEVEL_UV_CACHE_DIR:-../storage/devel/cache/uv}:${UV_CACHE_DIR:-/root/.cache/uv}
    gpus: all
