events {}

http {
    proxy_cache_path /var/cache/nginx/pytorch levels=1:2 keys_zone=pytorch_cache:100m max_size=200g inactive=30d use_temp_path=off;

    server {
        listen 80;
        server_name _;

        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_buffering on;
        proxy_cache pytorch_cache;
        proxy_cache_lock on;
        proxy_cache_revalidate on;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_valid 200 206 301 302 30d;
        proxy_cache_valid any 10m;
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
        add_header X-Proxy-Cache $upstream_cache_status always;

        location / {
            proxy_pass https://download.pytorch.org;
            proxy_set_header Host download.pytorch.org;
        }
    }
}
